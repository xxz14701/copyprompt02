<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 魔法提示詞產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 自訂選取按鈕的動畫與樣式 */
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn:active {
            transform: scale(0.95);
        }
        
        /* 隱藏預設捲軸，讓介面更乾淨 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        .toast {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(20px);
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- 標題區 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black text-emerald-600 tracking-wide drop-shadow-sm mb-3">
                ✨ AI 魔法提示詞產生器 ✨
            </h1>
            <p class="text-lg text-slate-600 font-medium">點點滑鼠，組合出你專屬的魔法咒語吧！</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左側：選項區 -->
            <div class="w-full lg:w-2/3 space-y-8 bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-white">
                
                <!-- 動態生成的選項區塊 -->
                <div id="categoriesContainer" class="space-y-8">
                    <!-- JavaScript 將在此處插入按鈕群 -->
                </div>

            </div>

            <!-- 右側：結果與複製區 (Sticky) -->
            <div class="w-full lg:w-1/3">
                <div class="sticky top-8 bg-gradient-to-br from-indigo-500 to-purple-600 p-1 rounded-3xl shadow-2xl">
                    <div class="bg-white p-6 rounded-[22px] h-full flex flex-col">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-2xl">📜</span>
                            <h2 class="text-2xl font-bold text-slate-800">你的專屬咒語</h2>
                        </div>
                        
                        <p class="text-sm text-slate-500 mb-2 font-medium">完成後，點擊下方按鈕複製，貼到 AI 繪圖工具中吧！</p>
                        
                        <div class="flex-grow bg-slate-50 rounded-2xl p-4 border-2 border-slate-100 mb-6 relative">
                            <textarea id="promptOutput" class="w-full h-full min-h-[200px] bg-transparent resize-none outline-none text-lg text-slate-700 font-medium leading-relaxed" readonly placeholder="你的提示詞會出現在這裡..."></textarea>
                        </div>

                        <button onclick="copyPrompt()" class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white text-xl font-bold py-4 rounded-2xl shadow-lg transform transition hover:-translate-y-1 active:translate-y-0 flex justify-center items-center gap-2">
                            <span>📋</span> 複製提示詞
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 複製成功的提示 Toast -->
    <div id="toast" class="toast fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-bold shadow-2xl z-50 flex items-center gap-2">
        ✅ 複製成功！趕快去貼上吧！
    </div>

    <script>
        // 定義所有的選項資料
        const config = [
            {
                id: 'outfit',
                title: '1. 穿著打扮 (風格)',
                icon: '👘',
                type: 'single',
                options: [
                    // 女性與唯美華麗風格
                    { label: '公主' }, { label: '仙女裝' }, { label: '白紗禮服' }, 
                    { label: '華麗晚禮服' }, { label: '貴婦洋裝' }, { label: '碎花洋裝' }, { label: '氣質套裝' },
                    // 傳統與民族服飾
                    { label: '旗袍' }, { label: '古裝' }, { label: '韓服' }, { label: '和服' }, 
                    { label: '歐洲宮廷服' }, { label: '歌仔戲服' }, { label: '原住民服飾' },
                    // 男性與帥氣風格
                    { label: '王子' }, { label: '皇帝龍袍' }, { label: '唐裝' }, { label: '中山裝' }, 
                    { label: '功夫裝' }, { label: '紳士西裝' }, { label: '帥氣軍裝' }, { label: '西部牛仔裝' }, 
                    // 休閒與特色風格
                    { label: '復古吊帶褲' }, { label: '夏威夷花襯衫' }, { label: '休閒運動服' }, 
                    { label: '登山休閒裝' }, { label: '魔法師長袍' }, { label: '科技未來裝' }
                ]
            },
            {
                id: 'emotion',
                title: '2. 表情心情',
                icon: '😊',
                type: 'single',
                options: [
                    { label: '開心大笑' }, { label: '溫柔微笑' }, { label: '慈祥' },
                    { label: '自信' }, { label: '俏皮' }, { label: '感動' },
                    { label: '寧靜' }, { label: '莊重' }, { label: '沉思' },
                    { label: '充滿活力' }, { label: '幸福快樂' }, { label: '驚訝' }
                ]
            },
            {
                id: 'action',
                title: '3. 正在做什麼 (可多選)',
                icon: '👋',
                type: 'multiple',
                options: [
                    { label: '揮手' }, { label: '喝茶' }, { label: '比愛心' },
                    { label: '賞花' }, { label: '散步' }, { label: '跳舞' },
                    { label: '拿著扇子' }, { label: '彈奏樂器' }, { label: '雙手合十' },
                    { label: '抱著寵物' }, { label: '打太極' }, { label: '寫書法' },
                    { label: '下棋' }, { label: '騎腳踏車' }, { label: '拿著咖啡' },
                    { label: '拍照' }, { label: '澆花' }, { label: '唱歌' }
                ]
            },
            {
                id: 'artStyle',
                title: '4. 藝術畫風 (含最新流行)',
                icon: '🎨',
                type: 'single',
                options: [
                    { label: '攝影寫真' }, { label: '唯美水彩' }, { label: '古典油畫' },
                    { label: '3D可愛動漫' }, { label: '傳統水墨畫' }, { label: '復古老照片' },
                    { label: '黏土人風格 (流行)' }, { label: '盲盒公仔風 (流行)' }, { label: '皮克斯3D風' },
                    { label: '新海誠動畫風' }, { label: '精緻剪紙藝術' }, { label: '玻璃彩繪' },
                    { label: '素描速寫' }, { label: '印象派油畫' }, { label: '夢幻童話風' }
                ]
            },
            {
                id: 'background',
                title: '5. 背景選擇',
                icon: '🌅',
                type: 'single',
                options: [
                    { label: '純白背景' }, { label: '彩色漸層背景' }, { label: '夢幻星空背景' },
                    { label: '大自然風景背景' }, { label: '溫馨室內背景' }, { label: '喜慶紅色背景' },
                    { label: '淡雅水墨背景' }, { label: '春暖花開背景' }, { label: '海灘夕陽背景' },
                    { label: '純色粉紅背景' }, { label: '復古斑駁牆面背景' }, { label: '簡約純黑背景' }
                ]
            }
        ];

        // 儲存學生的選擇
        const state = {
            outfit: '',
            emotion: '',
            action: [], // 陣列，支援多選
            artStyle: '',
            background: '' // 新增背景狀態
        };

        // 初始化介面
        function initUI() {
            const container = document.getElementById('categoriesContainer');
            
            config.forEach(category => {
                const section = document.createElement('section');
                
                // 標題
                const header = document.createElement('div');
                header.className = 'flex items-center gap-2 mb-4';
                header.innerHTML = `<span class="text-2xl">${category.icon}</span><h2 class="text-2xl font-bold text-slate-700">${category.title}</h2>`;
                section.appendChild(header);

                // 按鈕網格
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3';

                category.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `option-btn w-full bg-slate-50 hover:bg-slate-100 border-2 border-slate-200 text-slate-700 font-bold py-2 px-2 rounded-xl text-center shadow-sm transition-colors text-[15px]`;
                    btn.innerHTML = `<span>${opt.label}</span>`;
                    
                    // 點擊事件
                    btn.onclick = () => handleSelect(category.id, opt.label, category.type, btn, grid);
                    
                    grid.appendChild(btn);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // 處理選擇邏輯
        function handleSelect(categoryId, value, type, clickedBtn, gridElement) {
            if (type === 'single') {
                // 如果已經點選一樣的，就取消選取
                if (state[categoryId] === value) {
                    state[categoryId] = '';
                    setButtonActive(clickedBtn, false);
                } else {
                    state[categoryId] = value;
                    // 清除同群組其他按鈕的樣式
                    Array.from(gridElement.children).forEach(btn => setButtonActive(btn, false));
                    setButtonActive(clickedBtn, true);
                }
            } else if (type === 'multiple') {
                // 陣列操作 (新增或移除)
                const index = state[categoryId].indexOf(value);
                if (index > -1) {
                    state[categoryId].splice(index, 1);
                    setButtonActive(clickedBtn, false);
                } else {
                    state[categoryId].push(value);
                    setButtonActive(clickedBtn, true);
                }
            }
            
            updatePromptDisplay();
        }

        // 設定按鈕啟動/未啟動的樣式
        function setButtonActive(btn, isActive) {
            if (isActive) {
                btn.classList.remove('bg-slate-50', 'hover:bg-slate-100', 'border-slate-200', 'text-slate-700');
                btn.classList.add('bg-indigo-100', 'border-indigo-500', 'text-indigo-700', 'shadow-md');
            } else {
                btn.classList.remove('bg-indigo-100', 'border-indigo-500', 'text-indigo-700', 'shadow-md');
                btn.classList.add('bg-slate-50', 'hover:bg-slate-100', 'border-slate-200', 'text-slate-700');
            }
        }

        // 組合並更新提示詞
        function updatePromptDisplay() {
            let promptParts = ["依照上傳圖片"];
            let details = [];

            // 如果有選打扮
            if (state.outfit) {
                details.push(`換上 [${state.outfit}] 的造型`);
            }

            // 如果有選表情
            if (state.emotion) {
                details.push(`表情 [${state.emotion}]`);
            }

            // 如果有選動作 (可能多個)
            if (state.action.length > 0) {
                const actionStr = state.action.map(a => `[${a}]`).join('');
                details.push(`動作是 ${actionStr}`);
            }

            // 組合主要細節句子
            if (details.length > 0) {
                promptParts.push("，" + details.join("，"));
            } else {
                promptParts.push("，產生新的造型"); // 預設詞
            }

            // 加上風格
            if (state.artStyle) {
                promptParts.push(`，整體為 [${state.artStyle}] 畫風`);
            }

            // 加上背景設定
            if (state.background) {
                promptParts.push(`，背景為 [${state.background}]`);
            }

            promptParts.push(`。`);

            // 顯示在文字框
            const finalPrompt = promptParts.join('');
            document.getElementById('promptOutput').value = finalPrompt;
        }

        // 複製提示詞功能
        function copyPrompt() {
            const output = document.getElementById('promptOutput');
            const textToCopy = output.value;

            if (!textToCopy || textToCopy === '依照上傳圖片，產生新的造型。') {
                alert("請先點選左邊的選項來產生魔法咒語喔！");
                return;
            }

            // 使用 Clipboard API
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast();
            }).catch(err => {
                // 降級方案
                output.select();
                document.execCommand('copy');
                showToast();
            });
        }

        // 顯示複製成功的 Toast
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 網頁載入時初始化
        window.onload = () => {
            initUI();
            updatePromptDisplay(); // 顯示初始的預設字眼
        };

    </script>
</body>
</html>
